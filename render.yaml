services:
  - type: web
    name: yigui-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.9
      - key: DASHSCOPE_API_KEY
        sync: false
      - key: CORS_ALLOW_ORIGINS
        value: https://liufanshan11.github.io,http://localhost:5173,http://127.0.0.1:5173
      - key: SW_AUTO_OPEN
        value: "0"

